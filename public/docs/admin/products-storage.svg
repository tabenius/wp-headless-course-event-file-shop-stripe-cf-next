<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Products and Storage Panels</title>
  <desc id="desc">Illustration of product list editor and storage upload checklist panels in the admin UI.</desc>
  <rect width="1200" height="700" fill="#f8fafc" />
  <rect x="24" y="24" width="1152" height="652" rx="18" fill="#ffffff" stroke="#cbd5e1" />

  <rect x="52" y="56" width="520" height="588" rx="14" fill="#faf5ff" stroke="#d8b4fe" />
  <text x="80" y="94" fill="#6b21a8" font-family="Arial, sans-serif" font-size="24" font-weight="700">Products</text>
  <text x="80" y="122" fill="#7c3aed" font-family="Arial, sans-serif" font-size="14">Unified list: WooCommerce, LearnPress, Events, Digital</text>

  <rect x="80" y="150" width="464" height="44" rx="10" fill="#f3e8ff" stroke="#c4b5fd" />
  <text x="96" y="178" fill="#6d28d9" font-family="Arial, sans-serif" font-size="16">Filter: All sources | Search: "AI"</text>

  <rect x="80" y="212" width="464" height="110" rx="10" fill="#ffffff" stroke="#e9d5ff" />
  <text x="96" y="240" fill="#1f2937" font-family="Arial, sans-serif" font-size="18" font-weight="700">AI i praktiken</text>
  <text x="96" y="266" fill="#4b5563" font-family="Arial, sans-serif" font-size="14">Type: Course • Price: 1290 SEK • VAT: 25%</text>
  <rect x="410" y="226" width="122" height="28" rx="9" fill="#dcfce7" />
  <text x="437" y="245" fill="#047857" font-family="Arial, sans-serif" font-size="13">Active</text>
  <rect x="96" y="280" width="120" height="24" rx="8" fill="#ede9fe" />
  <text x="112" y="296" fill="#5b21b6" font-family="Arial, sans-serif" font-size="12">Category: Book</text>

  <rect x="80" y="334" width="464" height="110" rx="10" fill="#ffffff" stroke="#e9d5ff" />
  <text x="96" y="362" fill="#1f2937" font-family="Arial, sans-serif" font-size="18" font-weight="700">Startguide PDF</text>
  <text x="96" y="388" fill="#4b5563" font-family="Arial, sans-serif" font-size="14">Type: Digital file • Price: 390 SEK • VAT: 6%</text>
  <rect x="96" y="402" width="214" height="24" rx="8" fill="#e0f2fe" />
  <text x="112" y="418" fill="#0369a1" font-family="Arial, sans-serif" font-size="12">File: /bucket/startguide.pdf</text>

  <rect x="80" y="462" width="464" height="158" rx="10" fill="#ffffff" stroke="#e9d5ff" />
  <text x="96" y="490" fill="#6b21a8" font-family="Arial, sans-serif" font-size="16" font-weight="700">VAT by category</text>
  <text x="96" y="514" fill="#374151" font-family="Arial, sans-serif" font-size="13">book → 6% • course → 25% • audio → 25%</text>
  <rect x="96" y="530" width="122" height="32" rx="8" fill="#7c3aed" />
  <text x="126" y="551" fill="#ffffff" font-family="Arial, sans-serif" font-size="13">Save map</text>

  <rect x="612" y="56" width="536" height="588" rx="14" fill="#ecfeff" stroke="#67e8f9" />
  <text x="640" y="94" fill="#155e75" font-family="Arial, sans-serif" font-size="24" font-weight="700">Storage</text>
  <text x="640" y="122" fill="#0e7490" font-family="Arial, sans-serif" font-size="14">R2 / S3 setup, upload clients, and object visibility</text>

  <rect x="640" y="150" width="480" height="148" rx="10" fill="#ffffff" stroke="#a5f3fc" />
  <text x="660" y="178" fill="#164e63" font-family="Arial, sans-serif" font-size="16" font-weight="700">Connection checklist</text>
  <text x="660" y="204" fill="#334155" font-family="Arial, sans-serif" font-size="13">Endpoint: &lt;accountid&gt;.r2.cloudflarestorage.com</text>
  <text x="660" y="226" fill="#334155" font-family="Arial, sans-serif" font-size="13">Bucket: ragbaz-products</text>
  <text x="660" y="248" fill="#334155" font-family="Arial, sans-serif" font-size="13">Access Key / Secret Key: configured</text>
  <rect x="958" y="166" width="148" height="28" rx="8" fill="#cffafe" />
  <text x="994" y="185" fill="#155e75" font-family="Arial, sans-serif" font-size="12">Copy values</text>

  <rect x="640" y="312" width="480" height="150" rx="10" fill="#ffffff" stroke="#a5f3fc" />
  <text x="660" y="340" fill="#164e63" font-family="Arial, sans-serif" font-size="16" font-weight="700">Uploaded objects</text>
  <text x="660" y="366" fill="#334155" font-family="Arial, sans-serif" font-size="13">/downloads/startguide.pdf</text>
  <text x="660" y="388" fill="#334155" font-family="Arial, sans-serif" font-size="13">/images/ai-praktiken-cover.png</text>
  <text x="660" y="410" fill="#334155" font-family="Arial, sans-serif" font-size="13">/courses/graphql-fundamentals.zip</text>
  <rect x="980" y="424" width="126" height="24" rx="8" fill="#dbeafe" />
  <text x="1016" y="441" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="12">Use URL</text>

  <rect x="640" y="476" width="480" height="144" rx="10" fill="#ffffff" stroke="#a5f3fc" />
  <text x="660" y="504" fill="#164e63" font-family="Arial, sans-serif" font-size="16" font-weight="700">Cyberduck / WinSCP guidance</text>
  <text x="660" y="528" fill="#334155" font-family="Arial, sans-serif" font-size="13">Protocol: S3 • Region: auto • Path style: enabled</text>
  <text x="660" y="550" fill="#334155" font-family="Arial, sans-serif" font-size="13">Use exactly the endpoint + bucket shown above.</text>
  <text x="660" y="572" fill="#334155" font-family="Arial, sans-serif" font-size="13">Upload large files in desktop client, then paste URL in product editor.</text>
</svg>
